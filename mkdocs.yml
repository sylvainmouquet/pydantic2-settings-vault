site_name: pydantic2-settings-vault
site_description: Secure Pydantic v2 settings from HashiCorp Vault
site_url: https://sylvainmouquet.github.io/pydantic2-settings-vault/
repo_url: https://github.com/sylvainmouquet/pydantic2-settings-vault
repo_name: sylvainmouquet/pydantic2-settings-vault
edit_uri: edit/main/docs/

copyright: Copyright &copy; Sylvain Mouquet

theme:
  name: material
  language: en
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - content.code.copy
    - content.action.edit
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - toc.follow

plugins:
  - search

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true

nav:
  - Home: index.md
  - Usage guide: usage.md
  - Authentication: authentication.md
  - Advanced configuration: advanced-configuration.md
  - Vault KV & policies: vault-kv-and-policies.md

exclude_docs: |
  development.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/sylvainmouquet/pydantic2-settings-vault
