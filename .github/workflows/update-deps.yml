name: Update PYTHON Dependencies

on:
  schedule:
    - cron: '0 7 * * *'  # Runs every day at 7:00 AM
  workflow_dispatch:  # Allows manual triggering of the workflow

permissions:
  contents: write
  pull-requests: write

jobs:
  update-deps:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Install uv
        uses: astral-sh/setup-uv@v2

      - name: Install just
        uses: extractions/setup-just@v3

      - uses: ./.github/actions/checkout-sibling-deps

      - name: Use uv with Python version
        run: uv venv --python 3.14

      - name: Install dependencies
        run: uv sync

      - name: Save check dependencies output (before)
        id: check_deps_before
        run: |
          BEFORE=$(just check-deps) || true
          echo "BEFORE=${BEFORE}"

          echo "before<<EOF" >> $GITHUB_OUTPUT
          echo "$BEFORE" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Run just update
        run: just update

      - name: Run just check dependencies (after)
        id: check_deps_after
        run: |
          AFTER=$(just check-deps) || true
          echo "AFTER=${AFTER}"

          echo "after<<EOF" >> $GITHUB_OUTPUT
          echo "$AFTER" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create or Update Pull Request
        uses: peter-evans/create-pull-request@v7
        with:
          title: 'chore(deps): update python dependencies'
          body: |
            Automated update of uv.lock
            
            **Before:** 
            ${{ steps.check_deps_before.outputs.before }}
            
            **After:**
            ${{ steps.check_deps_after.outputs.after }}
          base: main
          branch: update-python-dependencies
          
