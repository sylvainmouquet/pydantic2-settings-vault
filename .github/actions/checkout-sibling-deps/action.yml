name: Checkout sibling dependencies
description: Clone pydocks, pycontainers, and proxycraft as sibling checkouts for local path dependencies

runs:
  using: composite
  steps:
    - name: Checkout sibling dependencies
      run: |
        if [ ! -f "../pydocks/pyproject.toml" ]; then
          git clone --depth 1 https://github.com/sylvainmouquet/pydocks.git ../pydocks
        fi
        if [ ! -f "../pycontainers/pyproject.toml" ]; then
          git clone --depth 1 https://github.com/sylvainmouquet/pycontainer.git ../pycontainers
        fi
        if [ ! -f "../proxycraft/pyproject.toml" ]; then
          git clone --depth 1 https://github.com/sylvainmouquet/proxycraft.git ../proxycraft
        fi
      shell: bash
